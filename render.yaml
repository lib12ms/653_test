services:
  # ── GPT-5 비교 버전 ─────────────────────────────────────────────────────────

  - type: web
    name: 653-gpt5-backend
    runtime: python
    rootDir: 653_gpt5ver/backend
    buildCommand: pip install -r ../requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # Render 대시보드에서 직접 입력 (Secret)
      - key: OPENAI_MODEL
        value: gpt-5
      - key: OPENAI_REASONING_EFFORT
        value: minimal
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "1200"
      - key: ALADIN_TTB_KEY
        sync: false          # Render 대시보드에서 직접 입력 (Secret)
      - key: PYTHON_VERSION
        value: "3.11"

  - type: web
    name: 653-gpt5-frontend
    runtime: python
    rootDir: 653_gpt5ver/streamlit_app
    buildCommand: pip install -r ../requirements-render.txt
    startCommand: >
      streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
      --server.enableCORS false
    envVars:
      - key: BACKEND_URL
        fromService:
          name: 653-gpt5-backend
          type: web
          property: host         # Render가 백엔드 URL을 자동으로 주입
      - key: PYTHON_VERSION
        value: "3.11"
